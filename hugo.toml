baseURL = 'https://littlelemonstudios.github.io/'
locale = 'en-us'
title = 'Little Lemon Studios'

[taxonomies]
  tag = "tags"

[markup]
  [markup.highlight]
    style = "dracula"
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.rendered]
      tabWidth = 4

[caches]
  [caches.images]
    dir = ':cacheDir/images'

